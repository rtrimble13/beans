[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "beans"
version = "0.1.0"
description = "Professional-grade double-entry accounting for personal finance"
readme = "README.md"
requires-python = ">=3.10"
license = { text = "MIT" }
keywords = ["accounting", "finance", "double-entry", "budgeting", "cli"]
classifiers = [
    "Environment :: Console",
    "Intended Audience :: End Users/Desktop",
    "Programming Language :: Python :: 3",
    "Topic :: Office/Business :: Financial :: Accounting",
]

[project.scripts]
beans = "beans.cli:main"

[project.optional-dependencies]
dev = ["pytest"]

[tool.setuptools.packages.find]
include = ["beans*"]

[tool.pytest.ini_options]
testpaths = ["tests"]
