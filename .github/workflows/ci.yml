name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      # Install the AI and MCP extras so the beans/ai and beans/mcp modules
      # and their offline tests (mock client, in-memory + subprocess MCP
      # protocol) are exercised. The `live` and `boundary` markers are
      # excluded by default (see pyproject addopts), so this stays fully
      # offline — no key, no network, no Windows/WSL boundary. The Ubuntu
      # runner is the WSL-equivalent userspace, so the MCP tests run here.
      - run: pip install -e ".[dev,ai,mcp]"
      - run: pytest -q

  # Guard the core promise: a base install (no optional extras) is untouched,
  # every module still imports, and `beans ai` degrades gracefully. Installs
  # WITHOUT the ai/mcp extras on a single Python.
  no-ai-extra:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]"
      # The full suite must pass without the extra too (the AI modules are
      # stdlib-only, so they import; their tests run against the mock client).
      - run: pytest -q
      # Assert the graceful-degradation path end-to-end: no key configured,
      # `beans ai` prints the install notice and exits 0, and the rest of the
      # tool is unaffected.
      - name: graceful degradation
        env:
          BEANS_LEDGER: ${{ runner.temp }}/ci-ledger.db
        run: |
          set -euo pipefail
          unset ANTHROPIC_API_KEY OPENAI_API_KEY BEANS_AI_KEY || true
          beans init
          out="$(beans ai ask 'hello there')"
          echo "$out"
          echo "$out" | grep -q 'beans-ledger\[ai\]'
          # A normal command is entirely unaffected.
          beans status >/dev/null
