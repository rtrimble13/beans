name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      # Install the AI extra so the beans/ai modules and their mock-client
      # tests are exercised. The `live` marker is excluded by default (see
      # pyproject addopts), so this stays fully offline — no key, no network.
      - run: pip install -e ".[dev,ai]"
      - run: pytest -q

  # Guard the core promise: a non-AI install is untouched and `beans ai`
  # degrades gracefully. Installs WITHOUT the extra on a single Python.
  no-ai-extra:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]"
      # The full suite must pass without the extra too (the AI modules are
      # stdlib-only, so they import; their tests run against the mock client).
      - run: pytest -q
      # Assert the graceful-degradation path end-to-end: no key configured,
      # `beans ai` prints the install notice and exits 0, and the rest of the
      # tool is unaffected.
      - name: graceful degradation
        env:
          BEANS_LEDGER: ${{ runner.temp }}/ci-ledger.db
        run: |
          set -euo pipefail
          unset ANTHROPIC_API_KEY OPENAI_API_KEY BEANS_AI_KEY || true
          beans init
          out="$(beans ai ask 'hello there')"
          echo "$out"
          echo "$out" | grep -q 'beans-ledger\[ai\]'
          # A normal command is entirely unaffected.
          beans status >/dev/null
