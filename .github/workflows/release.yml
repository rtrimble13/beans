name: Release

# Publishing is driven entirely by git tags. Pushing a tag that looks like a
# version (v1.2.3, v2.0.0rc1, ...) builds the distributions, creates a GitHub
# Release with auto-generated "What's Changed" notes, and publishes to PyPI
# via Trusted Publishing (OIDC — no long-lived API token required).
#
# See docs/MANUAL.md ("Releasing & publishing") for the full workflow and the
# one-time PyPI publisher setup.

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+[ab]*"
      - "v[0-9]+.[0-9]+.[0-9]+rc*"

permissions:
  contents: read

jobs:
  build:
    name: Build distributions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Verify the tag matches the package version
        run: |
          pip install -e . --quiet
          pkg_version="$(python -c 'import beans; print(beans.__version__)')"
          tag_version="${GITHUB_REF_NAME#v}"
          echo "Tag: ${tag_version}  Package: ${pkg_version}"
          if [ "${pkg_version}" != "${tag_version}" ]; then
            echo "::error::Tag ${GITHUB_REF_NAME} does not match package version ${pkg_version}. Run scripts/bump_version.py before tagging."
            exit 1
          fi
      - name: Build sdist and wheel
        run: |
          pip install build --quiet
          python -m build
      - name: Check the built distributions
        run: |
          pip install twine --quiet
          twine check dist/*
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  pypi-publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/beans-ledger/
    permissions:
      # Required for Trusted Publishing (OIDC). No PyPI API token is stored.
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          # Make re-runs safe: don't fail if this version is already on PyPI.
          skip-existing: true

  github-release:
    name: Create GitHub Release
    # Runs only after PyPI publishing succeeds, so a released tag always has
    # its distributions available on PyPI.
    needs: [build, pypi-publish]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Create release with generated notes
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: |
          prerelease=""
          case "${TAG}" in
            *a*|*b*|*rc*|*dev*) prerelease="--prerelease" ;;
          esac
          # Idempotent on re-run: create the release, or upload assets if it
          # already exists.
          if gh release view "${TAG}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            gh release upload "${TAG}" --repo "${GITHUB_REPOSITORY}" --clobber dist/*
          else
            gh release create "${TAG}" \
              --repo "${GITHUB_REPOSITORY}" \
              --title "${TAG}" \
              --generate-notes \
              ${prerelease} \
              dist/*
          fi
